<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vena Financial Services — Forecast Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #f8f9fb;
    --surface3: #eef0f4;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #111827;
    --text2: #4b5563;
    --text3: #9ca3af;
    --teal: #0a9e72;
    --teal-dim: rgba(10,158,114,0.1);
    --teal-dim2: rgba(10,158,114,0.06);
    --navy: #2563eb;
    --navy-dim: rgba(37,99,235,0.1);
    --amber: #b45309;
    --amber-dim: rgba(180,83,9,0.1);
    --red: #dc2626;
    --red-dim: rgba(220,38,38,0.08);
    --green: #0a9e72;
    --green-dim: rgba(10,158,114,0.1);
    --purple: #7c3aed;
    --purple-dim: rgba(124,58,237,0.1);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .sidebar-logo .wordmark {
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .sidebar-logo .sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    letter-spacing: .03em;
  }
  .nav-section { padding: 0 12px; margin-bottom: 8px; }
  .nav-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 0 8px;
    margin-bottom: 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--teal-dim); color: var(--teal); border-color: rgba(29,189,138,0.2); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .6; }
  .sidebar-week {
    margin-top: auto;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .sidebar-week .wk-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .sidebar-week .wk-val { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .main { flex: 1; overflow-x: hidden; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 50;
    gap: 16px;
  }
  .topbar-left h1 { font-size: 18px; font-weight: 600; color: var(--text); }
  .topbar-left .sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .topbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface3); color: var(--text); border-color: rgba(255,255,255,0.18); }
  .btn-primary {
    background: var(--teal);
    color: #fff;
    border-color: var(--teal);
    font-weight: 600;
  }
  .btn-primary:hover { background: #0b8862; border-color: #0b8862; }
  .btn-danger { background: var(--red-dim); color: var(--red); border-color: rgba(224,85,96,0.3); }
  .btn-danger:hover { background: rgba(224,85,96,0.25); }

  .content { padding: 24px 28px; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color .2s;
    animation: fadeUp .4s ease both;
  }
  .metric-card:hover { border-color: var(--border2); }
  .metric-card .label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .metric-card .value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    letter-spacing: -.02em;
  }
  .metric-card .meta { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .metric-card.teal .value { color: var(--teal); }
  .metric-card.amber .value { color: var(--amber); }
  .metric-card.navy .value { color: var(--navy); }
  .metric-card.red .value { color: var(--red); }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .filter-label { font-size: 11px; color: var(--text3); margin-right: 2px; }

  .chip {
    font-size: 12px;
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.on { background: var(--teal-dim); color: var(--teal); border-color: rgba(29,189,138,0.35); }
  .chip.on-amber { background: var(--amber-dim); color: var(--amber); border-color: rgba(232,160,32,0.35); }
  .chip.on-navy { background: var(--navy-dim); color: var(--navy); border-color: rgba(77,142,245,0.35); }
  .chip.on-red { background: var(--red-dim); color: var(--red); border-color: rgba(224,85,96,0.35); }

  .score-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-left: auto;
  }
  .score-toggle button {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border: none;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
    border-right: 1px solid var(--border);
  }
  .score-toggle button:last-child { border-right: none; }
  .score-toggle button.on { background: var(--surface3); color: var(--text); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    animation: fadeUp .5s ease .1s both;
  }
  table { width: 100%; border-collapse: collapse; min-width: 980px; }

  thead th {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text3);
    padding: 12px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text2); }
  thead th .sort-icon { margin-left: 4px; opacity: .4; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--teal); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.month-row { cursor: default; }
  tbody tr.month-row:hover { background: transparent; }

  td {
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .month-header {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text3);
    background: var(--bg);
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .month-header:first-child { border-top: none; }

  .pill {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .pill-ml { background: var(--navy-dim); color: var(--navy); }
  .pill-bc { background: var(--amber-dim); color: var(--amber); }
  .pill-pl { background: var(--surface3); color: var(--text2); }
  .pill-cw { background: var(--teal-dim); color: var(--teal); }
  .pill-cl { background: var(--red-dim); color: var(--red); }

  .score-wrap { display: flex; align-items: center; gap: 8px; }
  .score-bar-outer {
    width: 70px;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .score-pct { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
  .score-delta {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
  }
  .score-delta.up { background: var(--teal-dim); color: var(--teal); }
  .score-delta.dn { background: var(--red-dim); color: var(--red); }
  .score-delta.eq { background: var(--surface3); color: var(--text3); }

  .rep-wrap { display: flex; align-items: center; gap: 7px; }
  .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0;
  }
  .av-0 { background: rgba(37,99,235,.12); color: var(--navy); }
  .av-1 { background: rgba(10,158,114,.12); color: var(--teal); }
  .av-2 { background: rgba(180,83,9,.12); color: var(--amber); }
  .av-3 { background: rgba(124,58,237,.12); color: var(--purple); }
  .av-4 { background: rgba(220,38,38,.12); color: var(--red); }

  .acct-name { font-weight: 500; }
  .acct-note { font-size: 10px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .arr-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    animation: fadeIn .15s ease;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    width: 620px;
    max-width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp .2s ease;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface);
    z-index: 2;
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 20px; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
    transition: color .15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    position: sticky; bottom: 0;
    background: var(--surface);
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }

  .field label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text3); text-transform: uppercase;
    letter-spacing: .07em; margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 11px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-dim2);
  }
  .field select option { background: var(--surface2); }
  .field textarea { resize: vertical; min-height: 60px; }

  .acid-section { margin-top: 16px; }
  .section-title {
    font-size: 11px; font-weight: 600;
    color: var(--text3); text-transform: uppercase;
    letter-spacing: .1em; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  .acid-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .acid-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    transition: border-color .15s;
  }
  .acid-item:hover { border-color: var(--border2); }
  .acid-item .acid-label {
    flex: 1;
    font-size: 12px;
    color: var(--text2);
  }
  .acid-item .acid-weight {
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }
  .acid-item select {
    font-size: 11px;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface3);
    color: var(--text);
    cursor: pointer;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    min-width: 90px;
  }

  .score-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .sp-item { text-align: center; }
  .sp-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .sp-value { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .sp-bar { height: 4px; border-radius: 2px; margin-top: 6px; transition: width .3s; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .detail-item .dt-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
  .detail-item .dt-val { font-size: 13px; color: var(--text); font-weight: 500; }

  .acid-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .acid-detail-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .acid-dot-lg { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ad-y { background: var(--teal); }
  .ad-n { background: var(--surface3); border: 1px solid var(--border2); }
  .ad-na { background: var(--amber); }
  .acid-detail-label { font-size: 12px; color: var(--text2); flex: 1; }
  .acid-detail-val {
    font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 3px;
    min-width: 26px; text-align: center;
  }
  .adv-y { background: var(--teal-dim); color: var(--teal); }
  .adv-n { background: var(--surface3); color: var(--text3); }
  .adv-na { background: var(--amber-dim); color: var(--amber); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  .risk-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px;
  }
  .risk-high { background: var(--red-dim); color: var(--red); }
  .risk-med { background: var(--amber-dim); color: var(--amber); }
  .risk-low { background: var(--teal-dim); color: var(--teal); }

  .close-risk {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .cr-overdue { background: var(--red-dim); color: var(--red); }
  .cr-soon { background: var(--amber-dim); color: var(--amber); }
  .cr-ok { color: var(--text2); }

  @media (max-width: 1100px) {
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 0;
      height: auto;
      position: relative;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .topbar, .content { padding-left: 16px; padding-right: 16px; }
    .metrics { grid-template-columns: 1fr; }
    .form-grid, .form-grid.three, .detail-grid, .acid-detail-grid, .acid-grid {
      grid-template-columns: 1fr;
    }
    .score-preview { flex-direction: column; align-items: stretch; gap: 12px; }
    .score-toggle { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">Vena FS</div>
      <div class="sub">Forecast Tracker · FY27</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Views</div>
      <div class="nav-item active js-view-tab" data-view="pipeline">
        <span class="nav-dot"></span> Pipeline
      </div>
      <div class="nav-item js-view-tab" data-view="scoring">
        <span class="nav-dot"></span> Score Analysis
      </div>
    </div>
    <div class="nav-section" style="margin-top:16px">
      <div class="nav-label">By Rep</div>
      <div id="rep-nav"></div>
    </div>
    <div class="sidebar-week">
      <div class="wk-label">Current week</div>
      <div class="wk-val" id="wk-val"></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1 id="view-title">Q1 FY27 Pipeline</h1>
        <div class="sub" id="view-sub"></div>
      </div>
      <div class="topbar-right">
        <div class="score-toggle" id="score-toggle-wrap">
          <button class="on" data-score-mode="new">Revised score</button>
          <button data-score-mode="old">Original score</button>
          <button data-score-mode="both">Compare</button>
        </div>
        <button class="btn btn-primary" id="add-deal-btn">+ Add deal</button>
      </div>
    </div>

    <div class="content">
      <div class="metrics" id="metrics"></div>
      <div class="filters" id="filters"></div>
      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty" id="empty" style="display:none">No deals match the current filters.</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-header">
      <h2 id="modal-title">Add deal</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const ACID_CRITERIA = [
  { key:'workback',  label:'Workback plan',                   old:0.02,  new:0.06 },

];

function normalizeAcid(acid = {}) {
  const normalized = {};
  ACID_CRITERIA.forEach(c => {
    let v = acid[c.key];
    if (v == null || v === '') v = 'No';
    if (v === 'No but its an approved project' || v === 'Approved (not budgeted)') v = 'Approved';
    normalized[c.key] = v;
  });
  return normalized;
}

function calcScore(acid, mode) {
  const clean = normalizeAcid(acid);
  let score = 0;
  for (const c of ACID_CRITERIA) {
    const v = clean[c.key];
    const w = mode === 'old' ? c.old : c.new;
    if (v === 'Yes' || v === 'N/A') {
      score += w;
    } else if (c.tristate && v === 'Approved') {
      score += w * 0.5;
    }
  }
  return Math.min(Math.round(score * 100), 100);
}

function wkLabel() {
  const d = new Date();
  const weekday = d.getDay() || 7;
  const s = new Date(d);
  s.setHours(0, 0, 0, 0);
  s.setDate(d.getDate() - weekday + 1);
  const e = new Date(s);
  e.setDate(s.getDate() + 6);
  const f = x => x.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${f(s)} – ${f(e)}`;
}

function fArr(n) {
  const v = Number(n || 0);
  if (!v) return '—';
  if (v >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + (v / 1000).toFixed(0) + 'K';
  return '$' + v.toLocaleString();
}

function closeDate(str) {
  if (!str || str === 'TBD') return null;
  const d = new Date(str);
  return Number.isNaN(d.getTime()) ? null : d;
}

function closeDiff(str) {
  const d = closeDate(str);
  if (!d) return null;
  const now = new Date();
  now.setHours(0,0,0,0);
  const target = new Date(d);
  target.setHours(0,0,0,0);
  return Math.ceil((target - now) / (1000*60*60*24));
}

function closeDateHtml(str) {
  const diff = closeDiff(str);
  if (diff === null) return `<span style="color:var(--text3)">TBD</span>`;
  if (diff < 0) return `<span class="close-risk cr-overdue">${str}</span>`;
  if (diff <= 14) return `<span class="close-risk cr-soon">${str}</span>`;
  return `<span class="close-risk cr-ok">${str}</span>`;
}

function scoreBarColor(pct) {
  if (pct >= 70) return 'var(--teal)';
  if (pct >= 40) return 'var(--amber)';
  return 'var(--red)';
}

function riskLabel(pct) {
  if (pct >= 70) return ['risk-low','Low risk'];
  if (pct >= 40) return ['risk-med','Med risk'];
  return ['risk-high','High risk'];
}

function initials(name) {
  return String(name || '').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function filteredDeals() {
  return deals.filter(d => {
    if (repFilter !== 'All' && d.rep !== repFilter) return false;
    if (catFilter !== 'All' && d.cat !== catFilter) return false;
    return true;
  });
}

function activeVisibleDeals() {
  return filteredDeals().filter(d => !['Closed Won','Closed Lost'].includes(d.cat));
}

function getSortValue(d, col, view) {
  switch (col) {
    case 'rep': return d.rep || '';
    case 'acct': return d.acct || '';
    case 'ind': return d.ind || '';
    case 'arr': return Number(d.arr || 0);
    case 'close': {
      const dt = closeDate(d.close);
      return dt ? dt.getTime() : Number.MAX_SAFE_INTEGER;
    }
    case 'cat': return CATS.indexOf(d.cat);
    case 'score': return scoreMode === 'old' ? calcScore(d.acid, 'old') : calcScore(d.acid, 'new');
    case 'oldScore': return calcScore(d.acid, 'old');
    case 'newScore': return calcScore(d.acid, 'new');
    case 'delta': return calcScore(d.acid, 'new') - calcScore(d.acid, 'old');
    default: return view === 'scoring' ? calcScore(d.acid, 'new') : 0;
  }
}

function sortDeals(rows, view) {
  return [...rows].sort((a, b) => {
    const av = getSortValue(a, sortCol, view);
    const bv = getSortValue(b, sortCol, view);
    if (typeof av === 'string') {
      const cmp = av.localeCompare(bv);
      return cmp * sortDir;
    }
    const cmp = av === bv ? 0 : av > bv ? 1 : -1;
    return cmp * sortDir;
  });
}

function setView(v) {
  curView = v;
  document.querySelectorAll('.js-view-tab').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  sortCol = v === 'scoring' ? 'newScore' : 'close';
  sortDir = v === 'scoring' ? -1 : 1;
  document.getElementById('score-toggle-wrap').style.display = 'flex';
  renderAll();
}

function setScoreMode(m) {
  scoreMode = m;
  document.querySelectorAll('#score-toggle-wrap button').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.scoreMode === m);
  });
  if (curView === 'pipeline' && sortCol === 'score') sortDir = -1;
  renderAll();
}

function setRepFilter(r) { repFilter = r; renderAll(); }
function setCatFilter(c) { catFilter = c; renderAll(); }

function handleSort(col) {
  if (!SORTABLE_COLUMNS[curView].includes(col)) return;
  if (sortCol === col) sortDir *= -1;
  else {
    sortCol = col;
    sortDir = (col === 'arr' || col.includes('Score') || col === 'delta' || col === 'score') ? -1 : 1;
  }
  renderAll();
}

function sortHeader(label, col) {
  const sortable = SORTABLE_COLUMNS[curView].includes(col);
  const isSorted = sortCol === col;
  const icon = isSorted ? (sortDir === 1 ? '↑' : '↓') : '↕';
  return `<th class="${isSorted ? 'sorted' : ''}" ${sortable ? `onclick="handleSort('${col}')"` : ''}>${label}${sortable ? ` <span class="sort-icon">${icon}</span>` : ''}</th>`;
}

    scoreCells = `<td><div class="score-wrap">
      <div class="score-bar-outer"><div class="score-bar-fill" style="width:${s}%;background:${scoreBarColor(s)}"></div></div>
      <span class="score-pct" style="color:${scoreBarColor(s)}">${s}%</span>
    </div></td>`;
  }

  return `<tr onclick="openDetail(${d.id})">
    <td><div class="rep-wrap">
      <div class="avatar av-${rc}">${initials(d.rep)}</div>
      <span>${d.rep}</span>
    </div></td>
    <td><div class="acct-name">${d.acct}</div>${d.notes ? `<div class="acct-note">${d.notes}</div>` : ''}</td>
    <td style="color:var(--text2)">${d.ind}</td>
    <td><span class="arr-val">${fArr(d.arr)}</span></td>
    <td>${closeDateHtml(d.close)}</td>
    <td><span class="pill ${CAT_CLS[d.cat] || 'pill-pl'}">${d.cat}</span></td>
    ${scoreCells}
    <td><span class="risk-badge ${riskCls}">${riskTxt}</span></td>
  </tr>`;
}

function renderScoringTable() {
  document.getElementById('view-title').textContent = 'Score Analysis';
  document.getElementById('view-sub').textContent = 'Original vs. revised acid test model · all visible active deals';

  document.getElementById('thead').innerHTML = `<tr>
    ${sortHeader('Account','acct')}
    ${sortHeader('Rep','rep')}
    ${sortHeader('ARR','arr')}
    ${sortHeader('Category','cat')}
    ${sortHeader('Original score','oldScore')}
    ${sortHeader('Revised score','newScore')}
    ${sortHeader('Δ change','delta')}
    <th>Key gaps (revised model)</th>
  </tr>`;

  const vis = activeVisibleDeals();
  if (!vis.length) {
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';

  document.getElementById('tbody').innerHTML = sortDeals(vis, 'scoring').map(d => {
    const ns = calcScore(d.acid,'new');
    const os = calcScore(d.acid,'old');
    const delta = ns - os;
    const dSign = delta > 0 ? '+' : '';
    const dCls = delta > 0 ? 'up' : delta < 0 ? 'dn' : 'eq';

    const gaps = ACID_CRITERIA
      .filter(c => {
        const v = normalizeAcid(d.acid)[c.key];
        return v !== 'Yes' && v !== 'N/A' && c.new >= 0.05;
      })
      .sort((a,b) => b.new - a.new)
      .slice(0,3)
      .map(c => `<span style="font-size:11px;color:var(--text3);background:var(--surface3);padding:1px 6px;border-radius:3px;margin-right:3px">${c.label}</span>`)
      .join('');

    return `<tr onclick="openDetail(${d.id})">
      <td><span class="acct-name">${d.acct}</span></td>
      <td style="color:var(--text2)">${d.rep}</td>
      <td><span class="arr-val">${fArr(d.arr)}</span></td>
      <td><span class="pill ${CAT_CLS[d.cat] || 'pill-pl'}">${d.cat}</span></td>
      <td><div class="score-wrap">
        <div class="score-bar-outer"><div class="score-bar-fill" style="width:${os}%;background:${scoreBarColor(os)}"></div></div>
        <span class="score-pct" style="color:${scoreBarColor(os)}">${os}%</span>
      </div></td>
      <td><div class="score-wrap">
        <div class="score-bar-outer"><div class="score-bar-fill" style="width:${ns}%;background:${scoreBarColor(ns)}"></div></div>
        <span class="score-pct" style="color:${scoreBarColor(ns)}">${ns}%</span>
      </div></td>
      <td><span class="score-delta ${dCls}">${dSign}${delta}</span></td>
      <td>${gaps || '<span style="font-size:11px;color:var(--teal)">All key criteria met</span>'}</td>
    </tr>`;
  }).join('');
}

function renderAll() {
  renderSidebar();
  renderMetrics();
  renderFilters();
  if (curView === 'scoring') renderScoringTable();
  else renderPipelineTable();
}

function openDetail(id) {
  const d = deals.find(x => x.id === id);
  if (!d) return;
  editId = id;
  const ns = calcScore(d.acid,'new');
  const os = calcScore(d.acid,'old');
  const delta = ns - os;
  const dSign = delta >= 0 ? '+' : '';
  const dCls = delta > 0 ? 'up' : delta < 0 ? 'dn' : 'eq';

  document.getElementById('modal-title').textContent = d.acct;
  document.getElementById('modal-body').innerHTML = `
    <div class="score-preview">
      <div class="sp-item" style="flex:1">
        <div class="sp-label">Original score</div>
        <div class="sp-value" style="color:${scoreBarColor(os)}">${os}%</div>
        <div class="score-bar-outer" style="width:100%;margin-top:6px"><div class="score-bar-fill" style="width:${os}%;background:${scoreBarColor(os)}"></div></div>
      </div>
      <div style="width:1px;background:var(--border);align-self:stretch"></div>
      <div class="sp-item" style="flex:1">
        <div class="sp-label">Revised score</div>
        <div class="sp-value" style="color:${scoreBarColor(ns)}">${ns}%</div>
        <div class="score-bar-outer" style="width:100%;margin-top:6px"><div class="score-bar-fill" style="width:${ns}%;background:${scoreBarColor(ns)}"></div></div>
      </div>
      <div style="width:1px;background:var(--border);align-self:stretch"></div>
      <div class="sp-item" style="text-align:center">
        <div class="sp-label">Delta</div>
        <div class="sp-value" style="font-size:18px"><span class="score-delta ${dCls}" style="font-size:15px">${dSign}${delta}</span></div>
      </div>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><div class="dt-label">Rep</div><div class="dt-val">${d.rep}</div></div>
      <div class="detail-item"><div class="dt-label">ARR</div><div class="dt-val arr-val">${fArr(d.arr)}</div></div>
      <div class="detail-item"><div class="dt-label">Industry</div><div class="dt-val">${d.ind}</div></div>
      <div class="detail-item"><div class="dt-label">Segment</div><div class="dt-val">${d.seg}</div></div>
      <div class="detail-item"><div class="dt-label">Close date</div><div class="dt-val">${d.close || 'TBD'}</div></div>
      <div class="detail-item"><div class="dt-label">Category</div><div class="dt-val"><span class="pill ${CAT_CLS[d.cat] || 'pill-pl'}">${d.cat}</span></div></div>
      <div class="detail-item"><div class="dt-label">Competitors</div><div class="dt-val">${d.comp || '—'}</div></div>
      <div class="detail-item"><div class="dt-label">Partner</div><div class="dt-val">${d.part || '—'}</div></div>
      <div class="detail-item"><div class="dt-label">ALM</div><div class="dt-val">${d.alm || '—'}</div></div>
      <div class="detail-item"><div class="dt-label">MSFT Managed/MACC</div><div class="dt-val">${d.msft || '—'}</div></div>
    </div>
    ${d.notes ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text2);margin-bottom:14px">${d.notes}</div>` : ''}
    <div class="section-title">Acid test breakdown</div>
    <div class="acid-detail-grid">
      ${ACID_CRITERIA.map(c => {
        const v = normalizeAcid(d.acid)[c.key];
        const dotCls = v === 'Yes' ? 'ad-y' : v === 'N/A' ? 'ad-na' : 'ad-n';
        const valCls = v === 'Yes' ? 'adv-y' : v === 'N/A' ? 'adv-na' : 'adv-n';
        const wNew = Math.round(c.new * 100);
        const wOld = Math.round(c.old * 100);
        return `<div class="acid-detail-row">
          <div class="acid-dot-lg ${dotCls}"></div>
          <div class="acid-detail-label">${c.label}</div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:10px;color:var(--text3)">${wOld}%→${wNew}%</span>
            <span class="acid-detail-val ${valCls}">${v}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-danger" onclick="openEdit(${d.id})" style="margin-right:auto">Edit deal</button>
    <button class="btn" onclick="closeModal()">Close</button>`;

  document.getElementById('modal').style.display = 'flex';
}

function openAdd() {
  editId = null;
  renderForm(null);
}

function openEdit(id) {
  editId = id;
  closeModal();
  setTimeout(() => renderForm(deals.find(d => d.id === id)), 50);
}

function renderForm(d) {
  document.getElementById('modal-title').textContent = d ? 'Edit deal' : 'Add deal';
  const acid = d ? normalizeAcid(d.acid || {}) : normalizeAcid({});
  const ns = d ? calcScore(acid,'new') : 0;
  const os = d ? calcScore(acid,'old') : 0;

  document.getElementById('modal-body').innerHTML = `
    <div class="score-preview" id="sp">
      <div class="sp-item" style="flex:1">
        <div class="sp-label">Revised score (live)</div>
        <div class="sp-value" id="sp-new" style="color:${scoreBarColor(ns)}">${ns}%</div>
        <div class="score-bar-outer" style="width:100%;margin-top:6px"><div class="score-bar-fill" id="sp-new-bar" style="width:${ns}%;background:${scoreBarColor(ns)}"></div></div>
      </div>
      <div style="width:1px;background:var(--border);align-self:stretch"></div>
      <div class="sp-item" style="flex:1">
        <div class="sp-label">Original score</div>
        <div class="sp-value" id="sp-old" style="color:${scoreBarColor(os)}">${os}%</div>
        <div class="score-bar-outer" style="width:100%;margin-top:6px"><div class="score-bar-fill" id="sp-old-bar" style="width:${os}%;background:${scoreBarColor(os)}"></div></div>
      </div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Rep *</label>
        <select id="f-rep">
          ${REPS.filter(r => r !== 'All').map(r => `<option${d && d.rep === r ? ' selected' : ''}>${r}</option>`).join('')}
        </select></div>
      <div class="field"><label>Account *</label><input id="f-acct" type="text" value="${d ? d.acct : ''}" placeholder="Company name"></div>
    </div>
    <div class="form-grid three">
      <div class="field"><label>Industry</label>
        <select id="f-ind">
          ${['Insurance','Real Estate','Financial Services','Banking','Other'].map(v => `<option${d && d.ind === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select></div>
      <div class="field"><label>Segment</label>
        <select id="f-seg">
          ${['SMB','MM','ENT'].map(v => `<option${d && d.seg === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select></div>
      <div class="field"><label>ALM?</label>
        <select id="f-alm">
          ${['No','Yes'].map(v => `<option${d && d.alm === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>ARR ($)</label><input id="f-arr" type="number" value="${d ? d.arr : ''}" placeholder="e.g. 45000"></div>
      <div class="field"><label>Expected close date</label><input id="f-close" type="text" value="${d ? d.close : ''}" placeholder="Apr 30, 2026"></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Forecast category</label>
        <select id="f-cat">
          ${CATS.map(c => `<option${d && d.cat === c ? ' selected' : ''}>${c}</option>`).join('')}
        </select></div>
      <div class="field"><label>Competitors</label><input id="f-comp" type="text" value="${d ? d.comp : ''}" placeholder="e.g. DataRails, Adaptive"></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Partner</label>
        <select id="f-part">
          ${['Internal','Accuity Nova','C-Biz','Other'].map(v => `<option${d && d.part === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select></div>
      <div class="field"><label>MSFT Managed/MACC</label><input id="f-msft" type="text" value="${d && d.msft ? d.msft : ''}" placeholder="None"></div>
    </div>
    <div class="form-grid full">
      <div class="field"><label>Notes</label><textarea id="f-notes">${d ? d.notes : ''}</textarea></div>
    </div>

    <div class="section-title">Acid test <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0;font-size:11px">— updates score in real time</span></div>
    <div class="acid-grid">
      ${ACID_CRITERIA.map(c => {
        const v = acid[c.key] || 'No';
        const opts = c.tristate
          ? ['Yes','No','Approved (not budgeted)','N/A']
          : c.naOk ? ['Yes','No','N/A'] : ['Yes','No'];
        return `<div class="acid-item">
          <div class="acid-label">${c.label}</div>
          <div class="acid-weight">${Math.round(c.new * 100)}%</div>
          <select id="ac-${c.key}" onchange="updateLiveScore()">
            ${opts.map(o => `<option${v === o || (v === 'Approved' && o === 'Approved (not budgeted)') ? ' selected' : ''}>${o}</option>`).join('')}
          </select>
        </div>`;
      }).join('')}
    </div>`;

  document.getElementById('modal-footer').innerHTML = `
    ${d ? `<button class="btn btn-danger" onclick="deleteDeal(${d.id})" style="margin-right:auto">Delete</button>` : ''}
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveDeal()">Save deal</button>`;

  document.getElementById('modal').style.display = 'flex';
}

function updateLiveScore() {
  const acid = getAcidFromForm();
  const ns = calcScore(acid,'new');
  const os = calcScore(acid,'old');
  const ne = document.getElementById('sp-new');
  const oe = document.getElementById('sp-old');
  const nb = document.getElementById('sp-new-bar');
  const ob = document.getElementById('sp-old-bar');
  if (ne) { ne.textContent = ns + '%'; ne.style.color = scoreBarColor(ns); }
  if (oe) { oe.textContent = os + '%'; oe.style.color = scoreBarColor(os); }
  if (nb) { nb.style.width = ns + '%'; nb.style.background = scoreBarColor(ns); }
  if (ob) { ob.style.width = os + '%'; ob.style.background = scoreBarColor(os); }
}

function getAcidFromForm() {
  const acid = {};
  ACID_CRITERIA.forEach(c => {
    const el = document.getElementById('ac-' + c.key);
    if (el) {
      let v = el.value;
      if (v === 'Approved (not budgeted)') v = 'Approved';
      acid[c.key] = v;
    }
  });
  return normalizeAcid(acid);
}

function saveDeal() {
  const rep = document.getElementById('f-rep').value;
  const acct = document.getElementById('f-acct').value.trim();
  if (!acct) { alert('Account name is required.'); return; }

  const deal = {
    id: editId || nextId++,
    rep,
    acct,
    ind: document.getElementById('f-ind').value,
    seg: document.getElementById('f-seg').value,
    arr: Number(document.getElementById('f-arr').value) || 0,
    close: document.getElementById('f-close').value.trim() || 'TBD',
    cat: document.getElementById('f-cat').value,
    comp: document.getElementById('f-comp').value.trim(),
    part: document.getElementById('f-part').value,
    alm: document.getElementById('f-alm').value,
    msft: document.getElementById('f-msft').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    acid: getAcidFromForm(),
  };

  if (editId) deals = deals.map(d => d.id === editId ? deal : d);
  else deals.push(deal);

  closeModal();
  renderAll();
}

function deleteDeal(id) {
  if (!confirm('Remove this deal from the tracker?')) return;
  deals = deals.filter(d => d.id !== id);
  closeModal();
  renderAll();
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.getElementById('add-deal-btn').addEventListener('click', openAdd);
document.querySelectorAll('.js-view-tab').forEach(tab => {
  tab.addEventListener('click', () => setView(tab.dataset.view));
});
document.querySelectorAll('#score-toggle-wrap button').forEach(btn => {
  btn.addEventListener('click', () => setScoreMode(btn.dataset.scoreMode));
});

renderAll();
</script>
</body>
</html>
