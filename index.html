function loadDeals(){
  const raw=localStorage.getItem(STORAGE_KEY);

  ${deals.length?deals.map(d=>{ const ns=scoreDeal(d,'new'), os=scoreDeal(d,'old'), delta=ns-os; const gaps=ACID_CRITERIA.filter(c=>{const v=d.acid[c.key]; return v!=='Yes' && c.new>=0.05;}).sort((a,b)=>b.new-a.new).slice(0,3).map(c=>c.label).join(', '); return `<tr onclick="openDetail(${d.id})"><td><strong>${d.acct}</strong><div class="small muted">${d.cat} · ${formatMoney(d.arr)}</div></td><td>${d.rep}</td><td class="mono">${os}%</td><td class="mono">${ns}%</td><td class="mono ${delta>=0?'good':'danger'}">${delta>=0?'+':''}${delta}</td><td class="small">${gaps||'None'}</td><td class="small">${nextActions(d)[0]||'—'}</td></tr>`; }).join('') : `<tr><td colspan="7" class="empty">No active deals.</td></tr>`}
  </tbody></table></div>`;
}
function renderReps(root){
  document.getElementById('title').textContent='Rep View';
  document.getElementById('subtitle').textContent='Mini forecast pages for each seller';
  const reps=state.rep==='All'?REPS:[state.rep];
  root.innerHTML=`<div class="list">${reps.map(r=>repCard(r)).join('')}</div>`;
}
function repCard(r){
  const deals=state.deals.filter(d=>d.rep===r && !['Closed Won','Closed Lost'].includes(d.cat)); const rr=rollup(deals); const weak=deals.filter(d=>closeDiffDays(d.close)!==null && closeDiffDays(d.close)<=14 && scoreDeal(d,'new')<55).slice(0,3); const gaps=topRepGaps(deals);
  return `<div class="panel"><div class="panel-h"><h2>${r}</h2><span class="small muted">${deals.length} open deals</span></div><div class="panel-b"><div class="kv3">
    <div class="statbox"><div class="label">Open ARR</div><div class="value mono">${formatMoney(deals.reduce((s,d)=>s+Number(d.arr||0),0))}</div></div>
    <div class="statbox"><div class="label">Weighted</div><div class="value mono">${formatMoney(rr.weighted)}</div></div>
    <div class="statbox"><div class="label">Coverage</div><div class="value mono">${((deals.reduce((s,d)=>s+Number(d.arr||0),0)/TARGET_ARR)*100).toFixed(0)}%</div></div>
  </div>
  <div class="section-title">Near-term low-confidence deals</div>
  <div class="list">${weak.length?weak.map(d=>`<div class="item"><strong>${d.acct}</strong><div class="small">${d.close} · score ${scoreDeal(d,'new')}% · slip ${slipRisk(d)}%</div></div>`).join(''):'<div class="item">None</div>'}</div>
  <div class="section-title">Top coaching gaps</div>
  <div class="small">${gaps.join(' · ') || 'No obvious gap pattern'}</div></div></div>`;
}
function topRepGaps(deals){
  const map={}; deals.forEach(d=>ACID_CRITERIA.forEach(c=>{if((d.acid[c.key]||'No')!=='Yes' && c.new>=0.05) map[c.label]=(map[c.label]||0)+1;}));
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k,v])=>`${k} (${v})`);
}
function renderQuality(root){
  document.getElementById('title').textContent='Data Quality';
  document.getElementById('subtitle').textContent='Automated checks for stale, incomplete, and inconsistent forecast data';
  const rows=visibleDeals().map(d=>({deal:d, issues:qualityIssues(d)})).filter(x=>x.issues.length).sort((a,b)=>b.issues.length-a.issues.length);
  root.innerHTML=`<div class="panel"><div class="panel-h"><h2>Quality checks</h2><span class="small muted">${rows.length} deals with issues</span></div><div class="panel-b"><div class="list">${rows.length?rows.map(r=>`<div class="item" onclick="openDetail(${r.deal.id})"><strong>${r.deal.acct}</strong><div class="small">${r.deal.rep} · ${r.deal.cat} · ${formatMoney(r.deal.arr)}</div><div class="small danger">${r.issues.join(' | ')}</div></div>`).join(''):'<div class="item">No issues found.</div>'}</div></div></div>`;
}
function saveSnapshot(){
  const snaps=loadSnapshots();
  const rr=rollup(state.deals);
  snaps.push({ts:new Date().toISOString(), weighted:rr.weighted, commit:rr.commit, best:rr.best});
  localStorage.setItem(SNAP_KEY, JSON.stringify(snaps.slice(-24)));
  alert('Snapshot saved.');
  if(state.view==='forecast') render();
}
function loadSnapshots(){ try{return JSON.parse(localStorage.getItem(SNAP_KEY)||'[]');}catch(e){return[];} }
function exportJSON(){ downloadFile('forecast-data.json', JSON.stringify(state.deals,null,2), 'application/json'); }
function exportCSV(){
  const header=['id','rep','acct','industry','segment','arr','close','cat','weightedForecast','scoreNew','scoreOld','slipRisk','lastActivity','nextMeeting','blockerType'];
  const lines=[header.join(',')].concat(state.deals.map(d=>[
    d.id,d.rep,q(d.acct),q(d.ind),d.seg,d.arr,q(d.close),q(d.cat),Math.round(forecastValue(d).exp),scoreDeal(d,'new'),scoreDeal(d,'old'),slipRisk(d),d.lastActivity,d.nextMeeting,q(d.blockerType)
  ].join(',')));
  downloadFile('forecast-data.csv', lines.join('\n'), 'text/csv');
}
function q(s){ return '"'+String(s??'').replaceAll('"','""')+'"'; }
function downloadFile(name, text, type){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),500); }
function importJSON(e){ const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!Array.isArray(data)) throw new Error('Expected array'); state.deals=data.map(d=>enrichDeal(d,true)); persist(); render(); alert('Import complete.'); }catch(err){ alert('Could not import JSON.'); } e.target.value=''; }; r.readAsText(file); }
function openDetail(id){
  const d=state.deals.find(x=>x.id===id); if(!d) return;
  const fv=forecastValue(d), band=confidenceBand(d), flags=getFlags(d), issues=qualityIssues(d), acts=nextActions(d);
  const modal=document.getElementById('modal');
  modal.innerHTML=`<div class="modal-h"><div><strong>${d.acct}</strong><div class="small muted">${d.rep} · ${d.ind} · ${d.seg}</div></div><button class="btn" onclick="closeModal()">Close</button></div>
  <div class="modal-b">
    <div class="kv3">
      <div class="statbox"><div class="label">Revised score</div><div class="value mono" style="color:${barColor(scoreDeal(d,'new'))}">${scoreDeal(d,'new')}%</div></div>
      <div class="statbox"><div class="label">Expected forecast</div><div class="value mono">${formatMoney(fv.exp)}</div></div>
      <div class="statbox"><div class="label">Confidence band</div><div class="value mono">${Math.round(band.low*100)}-${Math.round(band.high*100)}%</div></div>
      <div class="statbox"><div class="label">Slip risk</div><div class="value mono ${slipRisk(d)>=65?'danger':slipRisk(d)>=40?'warn':'good'}">${slipRisk(d)}%</div></div>
      <div class="statbox"><div class="label">Close date</div><div class="value mono">${d.close||'TBD'}</div></div>
      <div class="statbox"><div class="label">ARR</div><div class="value mono">${formatMoney(d.arr)}</div></div>
    </div>
    <div class="section-title">Structured forecast fields</div>
    <div class="kv3">
      <div class="statbox"><div class="label">Last activity</div><div>${d.lastActivity||'—'}</div></div>
      <div class="statbox"><div class="label">Next meeting</div><div>${d.nextMeeting||'—'}</div></div>
      <div class="statbox"><div class="label">Decision status</div><div>${d.decisionStatus}</div></div>
      <div class="statbox"><div class="label">Blocker</div><div>${d.blockerType}</div></div>
      <div class="statbox"><div class="label">Legal</div><div>${d.legalStatus}</div></div>
      <div class="statbox"><div class="label">Security</div><div>${d.securityStatus}</div></div>
    </div>
    <div class="section-title">Flags</div><div>${flags.length?flags.map(f=>`<span class="badge ${f[1]==='high'?'badge-high':'badge-med'}" style="margin-right:6px">${f[0]}</span>`).join(' '):'<span class="muted">No active flags</span>'}</div>
    <div class="section-title">Recommended next actions</div><div class="list">${acts.map(a=>`<div class="item">${a}</div>`).join('') || '<div class="item">No action.</div>'}</div>
    <div class="section-title">Data quality</div><div class="small ${issues.length?'danger':'good'}">${issues.length?issues.join(' | '):'No issues found.'}</div>
    <div class="section-title">ACID breakdown</div><div class="acid-grid">${ACID_CRITERIA.map(c=>`<div class="acid"><span>${c.label}</span><span class="w">${Math.round(c.new*100)}%</span><strong>${d.acid[c.key]}</strong></div>`).join('')}</div>
    <div class="section-title">History</div><div class="history timeline">${(d.history||[]).slice().reverse().map(h=>`<div class="tl"><div>${h.text}</div><div class="t">${new Date(h.ts).toLocaleString()}</div></div>`).join('') || '<div class="muted">No history yet.</div>'}</div>
    ${d.notes?`<div class="section-title">Notes</div><div class="item">${d.notes}</div>`:''}
  </div>
  <div class="modal-f"><button class="btn btn-danger" onclick="deleteDeal(${d.id})">Delete</button><button class="btn" onclick="openForm(${d.id})">Edit deal</button></div>`;
  document.getElementById('modal-ov').style.display='flex';
}
window.openDetail=openDetail;
window.closeModal=()=>{document.getElementById('modal-ov').style.display='none';};
function openForm(id){
  const d=id?state.deals.find(x=>x.id===id):enrichDeal({rep:'Anthony',acct:'',ind:'Insurance',seg:'SMB',arr:0,close:'',cat:'Pipeline',comp:'',part:'Internal',alm:'No',notes:'',acid:{}},false);
  const editing=!!id;
  const acidOptions=c=>{
    const opts=c.tristate?['Yes','No','Approved','N/A']:(c.naNeutral?['Yes','No','N/A']:['Yes','No']);
    return opts.map(o=>`<option ${d.acid[c.key]===o?'selected':''}>${o}</option>`).join('');
  };
  document.getElementById('modal').innerHTML=`<div class="modal-h"><div><strong>${editing?'Edit deal':'Add deal'}</strong><div class="small muted">Weighted forecast updates live</div></div><button class="btn" onclick="closeModal()">Close</button></div>
  <div class="modal-b">
    <div class="kv3" style="margin-bottom:12px">
      <div class="statbox"><div class="label">Revised score</div><div id="live-score" class="value mono">0%</div></div>
      <div class="statbox"><div class="label">Expected probability</div><div id="live-prob" class="value mono">0%</div></div>
      <div class="statbox"><div class="label">Expected forecast</div><div id="live-forecast" class="value mono">—</div></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Rep</label><select id="f-rep">${REPS.map(r=>`<option ${d.rep===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Account</label><input id="f-acct" value="${esc(d.acct)}"></div>
      <div class="field"><label>ARR</label><input id="f-arr" type="number" value="${d.arr||0}"></div>
      <div class="field"><label>Industry</label><select id="f-ind">${['Insurance','Real Estate','Financial Services','Banking','Other'].map(v=>`<option ${d.ind===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Segment</label><select id="f-seg">${['SMB','MM','ENT'].map(v=>`<option ${d.seg===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Close date</label><input id="f-close" value="${esc(d.close||'')}" placeholder="Apr 30, 2026 or TBD"></div>
      <div class="field"><label>Category</label><select id="f-cat">${CATS.map(v=>`<option ${d.cat===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Competitor</label><input id="f-comp" value="${esc(d.comp)}"></div>
      <div class="field"><label>Partner</label><select id="f-part">${['Internal','Accuity Nova','C-Biz','Other'].map(v=>`<option ${d.part===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>ALM</label><select id="f-alm"><option ${d.alm==='No'?'selected':''}>No</option><option ${d.alm==='Yes'?'selected':''}>Yes</option></select></div>
      <div class="field"><label>MSFT Managed/MACC</label><input id="f-msft" value="${esc(d.msft||'')}"></div>
      <div class="field"><label>Rep confidence (1-5)</label><select id="f-repconf">${[1,2,3,4,5].map(v=>`<option value="${v}" ${Number(d.repConfidence)===v?'selected':''}>${v}</option>`).join('')}</select></div>
    </div>
    <div class="section-title">Structured forecast fields</div>
    <div class="form-grid">
      <div class="field"><label>Last activity</label><input id="f-last" type="date" value="${esc(d.lastActivity||todayISO())}"></div>
      <div class="field"><label>Next meeting</label><input id="f-next" type="date" value="${esc(d.nextMeeting||'')}"></div>
      <div class="field"><label>Blocker type</label><select id="f-blocker">${['None','Pricing','Procurement','Security','Executive alignment','No access','Competition','Timing'].map(v=>`<option ${d.blockerType===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Decision process</label><select id="f-decision">${['Early','Mutual evaluation','Final vendor selection','Papering','No access'].map(v=>`<option ${d.decisionStatus===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Legal status</label><select id="f-legal">${['Not started','In progress','Redlines','Approved'].map(v=>`<option ${d.legalStatus===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Security status</label><select id="f-security">${['Not started','Questionnaire sent','In review','Approved'].map(v=>`<option ${d.securityStatus===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>MAP status</label><select id="f-map">${['No MAP','Drafted','Shared','Active'].map(v=>`<option ${d.mapStatus===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Notes</label><textarea id="f-notes">${esc(d.notes)}</textarea></div>
    </div>
    <div class="section-title">ACID criteria</div>
    <div class="acid-grid">${ACID_CRITERIA.map(c=>`<div class="acid"><span>${c.label}</span><span class="w">${Math.round(c.new*100)}%</span><select id="ac-${c.key}">${acidOptions(c)}</select></div>`).join('')}</div>
  </div>
  <div class="modal-f"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveDeal(${editing?d.id:'null'})">Save deal</button></div>`;
  document.getElementById('modal-ov').style.display='flex';
  document.querySelectorAll('#modal input,#modal select,#modal textarea').forEach(el=>el.addEventListener('input',updateLive));
  updateLive();
}
window.openForm=openForm;
function esc(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function formDeal(id){
  const acid={}; ACID_CRITERIA.forEach(c=>acid[c.key]=document.getElementById('ac-'+c.key).value);
  return enrichDeal({
    id:id || Date.now(), rep:val('f-rep'), acct:val('f-acct').trim(), ind:val('f-ind'), seg:val('f-seg'), arr:Number(val('f-arr')||0), close:val('f-close').trim()||'TBD', cat:val('f-cat'), comp:val('f-comp').trim(), part:val('f-part'), alm:val('f-alm'), msft:val('f-msft').trim(), notes:val('f-notes').trim(), repConfidence:Number(val('f-repconf')),
    lastActivity:val('f-last'), nextMeeting:val('f-next'), blockerType:val('f-blocker'), decisionStatus:val('f-decision'), legalStatus:val('f-legal'), securityStatus:val('f-security'), mapStatus:val('f-map'), acid
  }, false);
}
function val(id){ return document.getElementById(id).value; }
function updateLive(){ const d=formDeal(null); document.getElementById('live-score').textContent=scoreDeal(d,'new')+'%'; document.getElementById('live-prob').textContent=Math.round(expectedProbability(d)*100)+'%'; document.getElementById('live-forecast').textContent=formatMoney(forecastValue(d).exp); }
window.saveDeal=(id)=>{
  const incoming=formDeal(id);
  if(!incoming.acct){ alert('Account is required.'); return; }
  if(id){
    const idx=state.deals.findIndex(d=>d.id===id); const old=state.deals[idx]; incoming.createdAt=old.createdAt; incoming.history=old.history||[];
    appendHistoryChanges(old,incoming); incoming.updatedAt=new Date().toISOString(); state.deals[idx]=incoming;
  } else {
    incoming.history=[hist('Created deal')]; state.deals.push(incoming);
  }
  persist(); closeModal(); render();
}
function appendHistoryChanges(oldv,newv){
  const changes=[];
  ['rep','acct','arr','close','cat','comp','part','lastActivity','nextMeeting','blockerType','decisionStatus','legalStatus','securityStatus','mapStatus'].forEach(k=>{ if(String(oldv[k]??'')!==String(newv[k]??'')) changes.push(`${labelOf(k)} changed from ${oldv[k]||'—'} to ${newv[k]||'—'}`); });
  ACID_CRITERIA.forEach(c=>{ if((oldv.acid[c.key]||'No')!==(newv.acid[c.key]||'No')) changes.push(`${c.label} changed from ${(oldv.acid[c.key]||'No')} to ${(newv.acid[c.key]||'No')}`); });
  if(!changes.length) changes.push('Saved with no material changes');
  newv.history=(oldv.history||[]).concat(changes.map(hist));
}
function labelOf(k){ return ({arr:'ARR', close:'close date', cat:'category', comp:'competitor', part:'partner', lastActivity:'last activity', nextMeeting:'next meeting', blockerType:'blocker', decisionStatus:'decision status', legalStatus:'legal status', securityStatus:'security status', mapStatus:'MAP status'})[k] || k; }
window.deleteDeal=(id)=>{ if(!confirm('Delete this deal?')) return; state.deals=state.deals.filter(d=>d.id!==id); persist(); closeModal(); render(); }

function drawAxes(ctx,w,h,pad){ ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(pad,10); ctx.lineTo(pad,h-pad); ctx.lineTo(w-10,h-pad); ctx.stroke(); }
function drawMonthChart(canvas,deals){ if(!canvas) return; const ctx=canvas.getContext('2d'), w=canvas.width,h=canvas.height,p=38; ctx.clearRect(0,0,w,h); drawAxes(ctx,w,h,p); const map={}; deals.forEach(d=>{const k=monthKey(d); map[k]=(map[k]||0)+forecastValue(d).exp;}); const keys=Object.keys(map); const vals=keys.map(k=>map[k]); const max=Math.max(...vals,1); const bw=Math.max(24,(w-p-20)/(keys.length||1)-14); keys.forEach((k,i)=>{ const x=p+12+i*(bw+14), bh=(vals[i]/max)*(h-p-24); ctx.fillStyle='rgba(37,99,235,.75)'; ctx.fillRect(x,h-p-bh,bw,bh); ctx.fillStyle='#6b7280'; ctx.font='11px system-ui'; ctx.fillText(k.split(' ')[0],x,h-p+15); ctx.fillText('$'+Math.round(vals[i]/1000)+'K',x,h-p-bh-6); }); }
function drawCategoryChart(canvas,deals){ if(!canvas) return; const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,p=38; ctx.clearRect(0,0,w,h); drawAxes(ctx,w,h,p); const keys=['Pipeline','Best Case','Most Likely']; const vals=keys.map(k=>deals.filter(d=>d.cat===k).reduce((s,d)=>s+forecastValue(d).exp,0)); const max=Math.max(...vals,1); const bw=80; keys.forEach((k,i)=>{ const x=70+i*135,bh=(vals[i]/max)*(h-p-24); ctx.fillStyle=i===0?'rgba(107,114,128,.7)':i===1?'rgba(180,83,9,.7)':'rgba(37,99,235,.7)'; ctx.fillRect(x,h-p-bh,bw,bh); ctx.fillStyle='#6b7280'; ctx.fillText(k,x,h-p+16); ctx.fillText('$'+Math.round(vals[i]/1000)+'K',x,h-p-bh-6); }); }
function drawSnapshotChart(canvas,snaps){ if(!canvas) return; const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,p=34; ctx.clearRect(0,0,w,h); drawAxes(ctx,w,h,p); if(snaps.length<1){ ctx.fillStyle='#9ca3af'; ctx.fillText('No snapshots yet',w/2-40,h/2); return; } const vals=snaps.map(s=>s.weighted); const max=Math.max(...vals,1), min=Math.min(...vals,0), span=Math.max(1,max-min); ctx.strokeStyle='rgba(37,99,235,.9)'; ctx.lineWidth=2; ctx.beginPath(); vals.forEach((v,i)=>{ const x=p+(i*(w-p-20))/Math.max(1,vals.length-1); const y=h-p-((v-min)/span)*(h-p-20); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke(); vals.forEach((v,i)=>{ const x=p+(i*(w-p-20))/Math.max(1,vals.length-1); const y=h-p-((v-min)/span)*(h-p-20); ctx.fillStyle='rgba(37,99,235,.9)'; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill(); if(i<snaps.length){ ctx.fillStyle='#6b7280'; ctx.font='10px system-ui'; ctx.fillText(new Date(snaps[i].ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}),x-10,h-p+14); } }); }

init();
</script>
