<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast Tracker</title>

<style>
body { font-family: Arial; margin:0; background:#f5f6f8; }

.topbar {
  display:flex;
  justify-content:space-between;
  padding:16px;
  background:white;
  border-bottom:1px solid #ddd;
}

.btn {
  padding:6px 12px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
  border-radius:6px;
}

.btn-primary {
  background:#0a9e72;
  color:white;
  border:none;
}

/* table */
table { width:100%; border-collapse:collapse; background:white; }

td, th { padding:10px; border-bottom:1px solid #eee; }

/* alternating rows */
tbody tr:nth-child(even) { background:#eef7f3; }

/* modal */
#settingsModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:white;
  width:700px;
  max-width:95%;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>
    <b>Rep View</b>
  </div>

  <div>
    <select id="quarter" onchange="render()">
      <option>All</option>
      <option>Q1</option>
      <option>Q2</option>
      <option>Q3</option>
      <option>Q4</option>
    </select>

    <button class="btn" onclick="openSettings()">Settings</button>
  </div>
</div>

<div style="padding:20px">

<h3>Leaderboard</h3>
<table>
<thead>
<tr>
<th>Rep</th>
<th>Open Deals</th>
<th>Q1 Target</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- MODAL -->
<div id="settingsModal">
  <div class="modal-box">
    <h2>Rep & Quota Settings</h2>

    <input id="newRep" placeholder="New rep name">
    <button onclick="addRep()">Add</button>

    <div id="settingsContent"></div>

    <div style="margin-top:20px; text-align:right">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="save()">Save</button>
    </div>
  </div>
</div>

<script>

let reps = JSON.parse(localStorage.getItem('reps') || '["Jake"]');
let targets = JSON.parse(localStorage.getItem('targets') || '{}');

function render() {
  document.getElementById('table').innerHTML =
    reps.map(r => `
      <tr>
        <td>${r}</td>
        <td>${Math.floor(Math.random()*5)}</td>
        <td>$${targets[r]?.Q1 || 0}</td>
      </tr>
    `).join('');
}

function openSettings() {
  document.getElementById('settingsModal').style.display='flex';
  renderSettings();
}

function closeSettings() {
  document.getElementById('settingsModal').style.display='none';
}

function save() {
  localStorage.setItem('reps', JSON.stringify(reps));
  localStorage.setItem('targets', JSON.stringify(targets));
  closeSettings();
  render();
}

function addRep() {
  const v = document.getElementById('newRep').value.trim();
  if(!v) return;
  reps.push(v);
  document.getElementById('newRep').value='';
  renderSettings();
}

function update(rep,q,val) {
  if(!targets[rep]) targets[rep]={};
  targets[rep][q]=Number(val)||0;
}

function removeRep(r) {
  reps = reps.filter(x=>x!==r);
  renderSettings();
}

function renderSettings() {
  document.getElementById('settingsContent').innerHTML =
    reps.map(r=>`
      <div style="margin:10px 0">
        <b>${r}</b>
        <button onclick="removeRep('${r}')">x</button>

        <div>
          ${['Q1','Q2','Q3','Q4'].map(q=>`
            <input 
              type="number"
              value="${targets[r]?.[q]||0}"
              onchange="update('${r}','${q}',this.value)"
              placeholder="${q}"
              style="width:70px;margin:3px"
            >
          `).join('')}
        </div>
      </div>
    `).join('');
}

render();

</script>
</body>
</html>
